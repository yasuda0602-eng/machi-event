*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#F5F5F5;color:#1a1a1a;}
.app{max-width:420px;margin:0 auto;min-height:100vh;background:#F5F5F5;}
.header{background:#fff;padding:14px 16px 10px;border-bottom:0.5px solid #e0e0e0;position:sticky;top:0;z-index:10;}
.app-title{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.search-row{display:flex;gap:8px;margin-bottom:10px;}
.search-wrap{flex:1;position:relative;}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#999;font-size:16px;}
.search-input{width:100%;padding:9px 12px 9px 32px;font-size:14px;border-radius:10px;border:0.5px solid #ddd;background:#F5F5F5;color:#1a1a1a;}
.search-input:focus{outline:none;border-color:#1D9E75;}
.search-btn{background:#1D9E75;color:white;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 12px;border-radius:99px;border:0.5px solid #ddd;font-size:12px;cursor:pointer;background:#F5F5F5;color:#666;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 0;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:5px 14px;border-radius:99px;border:0.5px solid #ddd;font-size:12px;cursor:pointer;background:#F5F5F5;color:#666;}
.filter-btn.active{background:#1D9E75;color:white;border-color:#1D9E75;}
.section-label{font-size:12px;font-weight:500;color:#666;padding:12px 16px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.loc-chip{display:inline-flex;align-items:center;gap:4px;background:#E1F5EE;color:#085041;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;}
.cards{padding:0 12px 100px;display:flex;flex-direction:column;gap:10px;}
.card{background:#fff;border-radius:14px;border:0.5px solid #e0e0e0;overflow:hidden;display:flex;cursor:pointer;transition:transform 0.1s;}
.card:active{transform:scale(0.98);}
.card-accent{width:4px;flex-shrink:0;}
.card-body{padding:14px;flex:1;display:flex;gap:12px;min-width:0;}
.card-date{min-width:42px;text-align:center;flex-shrink:0;}
.date-month{font-size:10px;color:#666;}
.date-day{font-size:22px;font-weight:600;line-height:1.1;}
.date-dow{font-size:10px;color:#999;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.card-place{font-size:12px;color:#666;display:flex;align-items:center;gap:4px;margin-bottom:6px;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;}
.tag-dist{background:#E1F5EE;color:#085041;font-weight:500;}
.tag-cat{background:#F5F5F5;color:#666;}
.tag-free{background:#FAEEDA;color:#633806;}
.tag-soon{background:#FAECE7;color:#993C1D;font-weight:500;}
.card-actions{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 12px 14px 0;flex-shrink:0;}
.bell-btn,.heart-btn{background:none;border:none;cursor:pointer;font-size:20px;color:#ccc;padding:2px;}
.bell-btn.on{color:#1D9E75;}
.heart-btn.on{color:#E24B4A;}
.empty{text-align:center;padding:48px 20px;color:#999;font-size:14px;line-height:1.8;}
.empty i{font-size:40px;color:#ddd;display:block;margin-bottom:12px;}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#fff;border-top:0.5px solid #e0e0e0;display:flex;padding:8px 0 20px;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#999;cursor:pointer;}
.tab-item.active{color:#1D9E75;}
.tab-item i{font-size:22px;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:0;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:99px;margin:12px auto 0;}
.modal-accent{height:6px;}
.modal-body{padding:20px;}
.modal-cat{font-size:12px;color:#666;margin-bottom:6px;}
.modal-title{font-size:20px;font-weight:700;margin-bottom:16px;line-height:1.3;}
.modal-info-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid #f0f0f0;}
.modal-info-row:last-of-type{border-bottom:none;}
.modal-info-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-info-label{font-size:11px;color:#999;margin-bottom:2px;}
.modal-info-value{font-size:14px;font-weight:500;}
.modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:20px;padding-bottom:8px;}
.btn-map{background:#1D9E75;color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;}
.btn-share{background:#F5F5F5;color:#1a1a1a;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;}
.btn-bell{background:#F5F5F5;color:#1a1a1a;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;}
.btn-bell.on{background:#E1F5EE;color:#085041;}
</style>
</head>

    </div>
  </div>
</div>

    {name:"新宿エイサーまつり",date:"2026-08-01",place:"新宿駅東口広場",dist:"0.2km",cat:"お祭り・縁日",free:true,color:"#E24B4A"},
    {name:"新宿ジャズフェスティバル",date:"2026-09-05",place:"新宿各所",dist:"〜1km",cat:"音楽",free:true,color:"#0F6E56"},
    {name:"代々木公園マルシェ",date:"2026-06-14",place:"代々木公園",dist:"1.2km",cat:"マルシェ・蚤の市",free:true,color:"#534AB7"},
    {name:"新宿アートフェス",date:"2026-07-18",place:"新宿高島屋周辺",dist:"0.5km",cat:"映画・アート",free:true,color:"#BA7517"},
    {name:"神宮外苑花火大会",date:"2026-08-22",place:"神宮外苑",dist:"2.3km",cat:"お祭り・縁日",free:false,color:"#E24B4A"},
  ],
};

let currentArea="",currentFilter="all",currentEvent=null;

function daysUntil(dateStr){
  const d=new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d-TODAY)/(1000*60*60*24));
}

function setArea(a){document.getElementById('search-input').value=a;doSearch();}

function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q)return;
  currentArea=q; currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.filter-btn')[0].classList.add('active');
  render();
}

function filterBy(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render(){
  if(!currentArea)return;
  const all=(DB[currentArea]||[]).filter(e=>daysUntil(e.date)>=0).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(!DB[currentArea]){
    document.getElementById('section-label').innerHTML=`「${currentArea}」`;
    document.getElementById('cards').innerHTML=`<div class="empty"><i class="ti ti-map-search"></i>「${currentArea}」は準備中です</div>`;
    return;
  }
  const filtered=currentFilter==='all'?all:all.filter(e=>e.cat===currentFilter);
  const locHtml=`<span class="loc-chip"><i class="ti ti-map-pin" style="font-size:11px"></i>${currentArea} 3km圏内</span>`;
  document.getElementById('section-label').innerHTML=`${locHtml} ${filtered.length}件`;
  if(!filtered.length){
    document.getElementById('cards').innerHTML='<div class="empty"><i class="ti ti-search-off"></i>イベントはありません</div>';
    return;
  }
  document.getElementById('cards').innerHTML=filtered.map(ev=>{
    const dt=new Date(ev.date);
    const days=daysUntil(ev.date);
    const soonTag=days<=7?`<span class="tag tag-soon">あと${days}日</span>`:'';
    return `<div class="card" onclick="openModal(${JSON.stringify(ev).replace(/"/g,'&quot;')})">
      <div class="card-accent" style="background:${ev.color}"></div>
      <div class="card-body">
        <div class="card-date">
          <div class="date-month">${MONTHS[dt.getMonth()]}</div>
          <div class="date-day">${dt.getDate()}</div>
          <div class="date-dow">${DAYS[dt.getDay()]}曜</div>
        </div>
        <div class="card-info">
          <div class="card-name">${ev.name}</div>
          <div class="card-place"><i class="ti ti-map-pin" style="font-size:12px"></i>${ev.place}</div>
          <div class="tags">
            <span class="tag tag-dist">${ev.dist}</span>
            <span class="tag tag-cat">${ev.cat}</span>
            ${ev.free?'<span class="tag tag-free">無料</span>':''}
            ${soonTag}
          </div>
        </div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="bell-btn" onclick="this.classList.toggle('on')"><i class="ti ti-bell"></i></button>
        <button class="heart-btn" onclick="this.classList.toggle('on')"><i class="ti ti-heart"></i></button>
      </div>
    </div>`;
  }).join('');
}

function openModal(ev){
  currentEvent=ev;
  const dt=new Date(ev.date);
  document.getElementById('modal-accent').style.background=ev.color;
  document.getElementById('modal-cat').innerHTML=`<i class="ti ti-tag"></i> ${ev.cat}`;
  document.getElementById('modal-title').textContent=ev.name;
  document.getElementById('modal-date').textContent=`${MONTHS[dt.getMonth()]}${dt.getDate()}日（${DAYS[dt.getDay()]}曜日）`;
  document.getElementById('modal-place').textContent=ev.place;
  document.getElementById('modal-dist').textContent=`現在地から約${ev.dist}`;
  document.getElementById('modal-free').textContent=ev.free?'無料':'有料';
  const btn=document.getElementById('btn-bell');
  btn.className='btn-bell';
  btn.innerHTML='<i class="ti ti-bell"></i> 通知を受け取る';
  document.getElementById('modal').classList.add('open');
}

function closeModalBg(e){if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');}

function openMap(){
  if(!currentEvent)return;
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentEvent.place+' '+currentEvent.name)}`,'_blank');
}

function toggleModalBell(){
  const btn=document.getElementById('btn-bell');
  btn.classList.toggle('on');
  btn.innerHTML=btn.classList.contains('on')?'<i class="ti ti-bell-ringing"></i> 通知ON！':'<i class="ti ti-bell"></i> 通知を受け取る';
}

function shareEvent(){
  if(!currentEvent)return;
  const dt=new Date(currentEvent.date);
  const text=`【${currentEvent.name}】\n📅 ${MONTHS[dt.getMonth()]}${dt.getDate()}日\n📍 ${currentEvent.place}\n${currentEvent.free?'入場無料':'有料'}\n\n#まちイベント`;
  if(navigator.share){navigator.share({title:currentEvent.name,text});}
  else{navigator.clipboard.writeText(text).then(()=>alert('コピーしました！'));}
}

document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
setArea('池尻大橋');
</script>
</body>
</html>
