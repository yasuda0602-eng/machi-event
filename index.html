*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#F5F5F5;color:#1a1a1a;overflow:hidden;height:100vh;}
.view{position:fixed;inset:0;background:#F5F5F5;display:none;flex-direction:column;z-index:1;}
.view.active{display:flex;}
#view-home{z-index:1;}
#view-map,#view-fav,#view-bell{z-index:20;}
.view-header{background:#fff;padding:14px 16px 10px;border-bottom:0.5px solid #e0e0e0;flex-shrink:0;}
.view-header-row{display:flex;align-items:center;gap:12px;margin-bottom:0;}
.back-btn{background:none;border:none;cursor:pointer;font-size:24px;color:#1a1a1a;padding:0;line-height:1;}
.view-title{font-size:17px;font-weight:600;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.app-title{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.search-row{display:flex;gap:8px;margin-bottom:10px;}
.search-wrap{flex:1;position:relative;}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#999;font-size:16px;}
.search-input{width:100%;padding:9px 12px 9px 32px;font-size:14px;border-radius:10px;border:0.5px solid #ddd;background:#F5F5F5;color:#1a1a1a;}
.search-input:focus{outline:none;border-color:#1D9E75;}
.search-btn{background:#1D9E75;color:white;border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
.chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 12px;border-radius:99px;border:0.5px solid #ddd;font-size:12px;cursor:pointer;background:#F5F5F5;color:#666;transition:all 0.15s;user-select:none;}
.chip.active-chip{background:#1D9E75;color:white;border-color:#1D9E75;}
.chip.dragging{opacity:0.4;transform:scale(1.05);}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 0;scrollbar-width:none;flex-shrink:0;background:#fff;border-bottom:0.5px solid #e0e0e0;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-btn{flex-shrink:0;padding:5px 14px;border-radius:99px;border:0.5px solid #ddd;font-size:12px;cursor:pointer;background:#F5F5F5;color:#666;}
.filter-btn.active{background:#1D9E75;color:white;border-color:#1D9E75;}
.section-label{font-size:12px;font-weight:500;color:#666;padding:12px 16px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.loc-chip{display:inline-flex;align-items:center;gap:4px;background:#E1F5EE;color:#085041;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;}
.cards{padding:0 12px 20px;display:flex;flex-direction:column;gap:10px;}
.card{background:#fff;border-radius:14px;border:0.5px solid #e0e0e0;overflow:hidden;display:flex;cursor:pointer;transition:transform 0.1s;}
.card:active{transform:scale(0.98);}
.card-accent{width:4px;flex-shrink:0;}
.card-body{padding:14px;flex:1;display:flex;gap:12px;min-width:0;}
.card-date{min-width:42px;text-align:center;flex-shrink:0;}
.date-month{font-size:10px;color:#666;}
.date-day{font-size:22px;font-weight:600;line-height:1.1;}
.date-dow{font-size:10px;color:#999;}
.date-range{font-size:9px;color:#1D9E75;font-weight:600;margin-top:2px;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.3;}
.card-place{font-size:12px;color:#666;display:flex;align-items:center;gap:4px;margin-bottom:6px;}
.tags{display:flex;gap:5px;flex-wrap:wrap;}
.tag{font-size:11px;padding:2px 8px;border-radius:99px;}
.tag-dist{background:#E1F5EE;color:#085041;font-weight:500;}
.tag-cat{background:#F5F5F5;color:#666;}
.tag-free{background:#FAEEDA;color:#633806;}
.tag-soon{background:#FAECE7;color:#993C1D;font-weight:500;}
.card-actions{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 12px 14px 0;flex-shrink:0;}
.bell-btn,.heart-btn{background:none;border:none;cursor:pointer;font-size:20px;color:#ccc;padding:2px;}
.bell-btn.on{color:#1D9E75;}
.heart-btn.on{color:#E24B4A;}
.empty{text-align:center;padding:48px 20px;color:#999;font-size:14px;line-height:1.8;}
.empty i{font-size:40px;color:#ddd;display:block;margin-bottom:12px;}
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:0.5px solid #e0e0e0;display:flex;padding:8px 0 20px;z-index:100;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#999;cursor:pointer;}
.tab-item.active{color:#1D9E75;}

// 期間表示ヘルパー
function formatDateRange(ev){
  const dt=new Date(ev.date);
  const m=MONTHS[dt.getMonth()];
  const d=dt.getDate();
  const dow=DAYS[dt.getDay()];
  if(!ev.dateEnd) return `${m}${d}日（${dow}曜日）`;
  const dt2=new Date(ev.dateEnd);
  const m2=MONTHS[dt2.getMonth()];
  const d2=dt2.getDate();
  const dow2=DAYS[dt2.getDay()];
  if(dt.getMonth()===dt2.getMonth()) return `${m}${d}日（${dow}）〜${d2}日（${dow2}）`;
  return `${m}${d}日（${dow}）〜${m2}${d2}日（${dow2}）`;
}

function formatDateShort(ev){
  const dt=new Date(ev.date);
  if(!ev.dateEnd) return null;
  const dt2=new Date(ev.dateEnd);
  if(dt.getMonth()===dt2.getMonth()) return `${dt.getDate()}〜${dt2.getDate()}日`;
  return `${MONTHS[dt.getMonth()]}${dt.getDate()}〜${MONTHS[dt2.getMonth()]}${dt2.getDate()}日`;
}

let currentArea='池尻大橋', currentFilter='all', currentEvent=null;
let favorites=JSON.parse(localStorage.getItem('machi-fav')||'[]');

// ===== タブ切り替え =====
function showTab(tab){
  ['home','map','bell','fav'].forEach(t=>{
    document.getElementById('view-'+t).classList.remove('active');
    document.getElementById('tab-'+t).classList.remove('active');
  });
  document.getElementById('view-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='map') renderMap();
  if(tab==='fav') renderFav();
}

// ===== ホーム =====
function daysUntil(d){const dt=new Date(d);dt.setHours(0,0,0,0);return Math.round((dt-TODAY)/86400000);}

function setArea(a){
  currentArea=a;
  document.getElementById('search-input').value=a;
  document.querySelectorAll('#area-chips .chip').forEach(c=>{
    c.classList.toggle('active-chip', c.textContent.replace('📍 ','')===a);
  });
  currentFilter='all';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.filter-btn')[0].classList.add('active');
  render();
  const chips=document.getElementById('area-chips');
  const activeChip=document.querySelector('#area-chips .chip.active-chip');
  if(activeChip) chips.scrollLeft=activeChip.offsetLeft-chips.offsetWidth/2+activeChip.offsetWidth/2;
}

function doSearch(){
  const q=document.getElementById('search-input').value.trim();
  if(!q)return;
  setArea(q);
}

function filterBy(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function isFav(ev){return favorites.some(f=>f.name===ev.name&&f.date===ev.date);}

function render(){
  if(!currentArea)return;
  if(!DB[currentArea]){
    document.getElementById('section-label').innerHTML=`「${currentArea}」は準備中です`;
    document.getElementById('cards').innerHTML='<div class="empty"><i class="ti ti-map-search"></i>別の町を試してください</div>';
    return;
  }
  const all=DB[currentArea].filter(e=>daysUntil(e.date)>=0).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const filtered=currentFilter==='all'?all:all.filter(e=>e.cat===currentFilter);
  document.getElementById('section-label').innerHTML=`<span class="loc-chip"><i class="ti ti-map-pin" style="font-size:11px"></i>${currentArea}</span> ${filtered.length}件`;
  document.getElementById('cards').innerHTML=filtered.length?filtered.map(ev=>{
    const dt=new Date(ev.date);
    const days=daysUntil(ev.date);
    const rangeLabel=ev.dateEnd?`<div class="date-range">${formatDateShort(ev)}</div>`:'';
    return `<div class="card" onclick="openModal(${JSON.stringify(ev).replace(/"/g,'&quot;')})">
      <div class="card-accent" style="background:${ev.color}"></div>
      <div class="card-body">
        <div class="card-date">
          <div class="date-month">${MONTHS[dt.getMonth()]}</div>
          <div class="date-day">${dt.getDate()}</div>
          <div class="date-dow">${DAYS[dt.getDay()]}曜</div>
          ${rangeLabel}
        </div>
        <div class="card-info">
          <div class="card-name">${ev.name}</div>
          <div class="card-place"><i class="ti ti-map-pin" style="font-size:12px"></i>${ev.place}</div>
          <div class="tags">
            <span class="tag tag-dist">${ev.dist}</span>
            <span class="tag tag-cat">${ev.cat}</span>
            ${ev.free?'<span class="tag tag-free">無料</span>':''}
            ${days<=7?`<span class="tag tag-soon">あと${days}日</span>`:''}
          </div>
        </div>
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="bell-btn" onclick="this.classList.toggle('on')"><i class="ti ti-bell"></i></button>
        <button class="heart-btn ${isFav(ev)?'on':''}" onclick="toggleFavBtn(${JSON.stringify(ev).replace(/"/g,'&quot;')},this)"><i class="ti ti-heart"></i></button>
      </div>
    </div>`;
  }).join(''):'<div class="empty"><i class="ti ti-search-off"></i>イベントはありません</div>';
}

// ===== モーダル =====
function openModal(ev){
  currentEvent=ev;
  document.getElementById('modal-accent').style.background=ev.color;
  document.getElementById('modal-cat').innerHTML=`<i class="ti ti-tag"></i> ${ev.cat}`;
  document.getElementById('modal-title').textContent=ev.name;
  document.getElementById('modal-date').textContent=formatDateRange(ev);
  document.getElementById('modal-place').textContent=ev.place;
  document.getElementById('modal-dist').textContent=`現在地から約${ev.dist}`;
  document.getElementById('modal-free').textContent=ev.free?'無料':'有料';
  document.getElementById('btn-bell').className='btn-bell';
  document.getElementById('btn-bell').innerHTML='<i class="ti ti-bell"></i> 通知を受け取る';
  const place=encodeURIComponent(ev.place);
  const shops=[
    {label:'☕ カフェ',q:place+'%20カフェ'},
    {label:'🍽 ランチ',q:place+'%20ランチ'},
    {label:'🍷 ディナー',q:place+'%20ディナー'},
    {label:'🍣 一人OK',q:place+'%20一人%20ディナー'},
    {label:'🍺 バー',q:place+'%20バー'},
  ];
  document.getElementById('shop-btns').innerHTML=shops.map(s=>`<button class="shop-btn" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${s.q}','_blank')">${s.label}</button>`).join('');
  document.getElementById('modal').classList.add('open');
}

function openMap(){
  if(!currentEvent)return;
  window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentEvent.place+' '+currentEvent.name)}`,'_blank');
}

function toggleBell(){
  const btn=document.getElementById('btn-bell');
  btn.classList.toggle('on');
  btn.innerHTML=btn.classList.contains('on')?'<i class="ti ti-bell-ringing"></i> 通知ON！':'<i class="ti ti-bell"></i> 通知を受け取る';
}

function shareEvent(){
  if(!currentEvent)return;
  const dateStr=formatDateRange(currentEvent);
  const text=`【${currentEvent.name}】\n📅 ${dateStr}\n📍 ${currentEvent.place}\n${currentEvent.free?'入場無料':'有料'}\n\n#まちイベント`;
  if(navigator.share)navigator.share({title:currentEvent.name,text});
  else navigator.clipboard.writeText(text).then(()=>alert('コピーしました！'));
}

// ===== お気に入り =====
function toggleFavBtn(ev,btn){
  if(isFav(ev)){favorites=favorites.filter(f=>!(f.name===ev.name&&f.date===ev.date));btn.classList.remove('on');}
  else{favorites.push(ev);btn.classList.add('on');}
  localStorage.setItem('machi-fav',JSON.stringify(favorites));
}

function renderFav(){
  const container=document.getElementById('fav-cards');
  if(!favorites.length){container.innerHTML='<div class="empty"><i class="ti ti-heart-off"></i>お気に入りはまだありません<br>ハートを押して追加してください</div>';return;}
  const active=favorites.filter(e=>daysUntil(e.date)>=0).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const past=favorites.filter(e=>daysUntil(e.date)<0);
  let html=active.map(ev=>favCard(ev)).join('');
  if(past.length)html+=`<div style="font-size:12px;color:#999;padding:8px 4px;margin-top:4px;">終了したイベント</div>`+past.map(ev=>favCard(ev,true)).join('');
  container.innerHTML=html||'<div class="empty"><i class="ti ti-heart-off"></i>お気に入りはまだありません</div>';
}

function favCard(ev,ended=false){
  const dt=new Date(ev.date);
  const rangeLabel=ev.dateEnd?`<div class="date-range">${formatDateShort(ev)}</div>`:'';
  return `<div class="card" style="${ended?'opacity:0.5':''}" onclick="openModal(${JSON.stringify(ev).replace(/"/g,'&quot;')})">
    <div class="card-accent" style="background:${ev.color}"></div>
    <div class="card-body">
      <div class="card-date"><div class="date-month">${MONTHS[dt.getMonth()]}</div><div class="date-day">${dt.getDate()}</div><div class="date-dow">${DAYS[dt.getDay()]}曜</div>${rangeLabel}</div>
      <div class="card-info">
        <div class="card-name">${ev.name}</div>
        <div class="card-place"><i class="ti ti-map-pin" style="font-size:12px"></i>${ev.place}</div>
        <div class="tags"><span class="tag tag-dist">${ev.dist}</span><span class="tag tag-cat">${ev.cat}</span>${ev.free?'<span class="tag tag-free">無料</span>':''}</div>
      </div>
    </div>
    <div class="card-actions" onclick="event.stopPropagation()">
      <button class="heart-btn on" onclick="removeFav(${JSON.stringify(ev).replace(/"/g,'&quot;')})"><i class="ti ti-heart"></i></button>
    </div>
  </div>`;
}

function removeFav(ev){
  favorites=favorites.filter(f=>!(f.name===ev.name&&f.date===ev.date));
  localStorage.setItem('machi-fav',JSON.stringify(favorites));
  renderFav();
}

// ===== 地図 =====
function renderMap(){
  const all=Object.values(DB).flat().filter(e=>daysUntil(e.date)>=0).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const seen=new Set();
  const unique=all.filter(e=>{const k=e.name+e.date;if(seen.has(k))return false;seen.add(k);return true;});
  document.getElementById('map-event-list').innerHTML=unique.map(ev=>{
    const dt=new Date(ev.date);
    const rangeLabel=ev.dateEnd?`<div class="date-range">${formatDateShort(ev)}</div>`:'';
    const q=encodeURIComponent(ev.place+' '+ev.name);
    return `<div class="card" onclick="window.open('https://www.google.com/maps/search/?api=1&query=${q}','_blank')">
      <div class="card-accent" style="background:${ev.color}"></div>
      <div class="card-body">
        <div class="card-date"><div class="date-month">${MONTHS[dt.getMonth()]}</div><div class="date-day">${dt.getDate()}</div><div class="date-dow">${DAYS[dt.getDay()]}曜</div>${rangeLabel}</div>
        <div class="card-info">
          <div class="card-name">${ev.name}</div>
          <div class="card-place"><i class="ti ti-map-pin" style="font-size:12px"></i>${ev.place}</div>
          <div class="tags"><span class="tag tag-dist">${ev.dist}</span><span class="tag tag-cat">${ev.cat}</span>${ev.free?'<span class="tag tag-free">無料</span>':''}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;padding:0 14px;color:#1D9E75;flex-shrink:0;"><i class="ti ti-map-2" style="font-size:22px;"></i></div>
    </div>`;
  }).join('');
}

// ===== スワイプで街切り替え =====
let touchSX=0, touchSY=0, isSwiping=false;
document.getElementById('home-scroll').addEventListener('touchstart',e=>{
  touchSX=e.touches[0].clientX;
  touchSY=e.touches[0].clientY;
  isSwiping=false;
},{passive:true});
document.getElementById('home-scroll').addEventListener('touchmove',e=>{
  const dx=Math.abs(e.touches[0].clientX-touchSX);
  const dy=Math.abs(e.touches[0].clientY-touchSY);
  if(dx>dy&&dx>10) isSwiping=true;
},{passive:true});
document.getElementById('home-scroll').addEventListener('touchend',e=>{
  if(!isSwiping)return;
  const dx=e.changedTouches[0].clientX-touchSX;
  const dy=e.changedTouches[0].clientY-touchSY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    const idx=AREA_ORDER.indexOf(currentArea);
    let next=null;
    if(dx<0&&idx<AREA_ORDER.length-1) next=AREA_ORDER[idx+1];
    else if(dx>0&&idx>0) next=AREA_ORDER[idx-1];
    if(next){
      setArea(next);
      const hint=document.getElementById('swipe-hint');
      hint.textContent=next;
      hint.classList.add('show');
      setTimeout(()=>hint.classList.remove('show'),1000);
    }
  }
},{passive:true});

// ===== チップ長押しで並び替え =====
let dragEl=null;
function initDrag(){
  document.querySelectorAll('#area-chips .chip').forEach(chip=>{
    let timer=null;
    chip.addEventListener('touchstart',e=>{
      timer=setTimeout(()=>{
        dragEl=chip;
        chip.classList.add('dragging');
        navigator.vibrate&&navigator.vibrate(30);
      },500);
    },{passive:true});
    chip.addEventListener('touchmove',e=>{
      clearTimeout(timer);
      if(!dragEl)return;
      const touch=e.touches[0];
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      if(el&&el.classList.contains('chip')&&el!==dragEl){
        const parent=el.parentNode;
        const arr=[...parent.children];
        if(arr.indexOf(dragEl)<arr.indexOf(el)) parent.insertBefore(dragEl,el.nextSibling);
        else parent.insertBefore(dragEl,el);
      }
      e.preventDefault();
    },{passive:false});
    chip.addEventListener('touchend',e=>{
      clearTimeout(timer);
      if(dragEl){dragEl.classList.remove('dragging');dragEl=null;}
    },{passive:true});
  });
}

document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
setArea('池尻大橋');
initDrag();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(reg=>{
      // アプリを開くたびに新しいバージョンがないか確認する
      reg.update();
    });
  });
}
